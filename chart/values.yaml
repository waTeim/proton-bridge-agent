# Default values for proton-bridge.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  # Build from build/ and push to your registry, then override repository here.
  # The upstream image (shenxn/protonmail-bridge) can be used directly but lacks
  # the custom entrypoint and init.sh required for the keychain initContainer.
  repository: shenxn/protonmail-bridge
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  smtpPort: 1025
  imapPort: 1143

persistence:
  enabled: true
  size: 1Gi
  accessMode: ReadWriteOnce
  # storageClass: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
