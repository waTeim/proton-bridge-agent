{{- if and .Values.sidecar.enabled (ne .Values.sidecar.discord.botToken "") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "proton-bridge.fullname" . }}-discord
  labels:
    {{- include "proton-bridge.labels" . | nindent 4 }}
type: Opaque
stringData:
  discord.yaml: |
    # Discord bot configuration — managed by Helm.
    bot_token: {{ .Values.sidecar.discord.botToken | quote }}
    channel_id: {{ .Values.sidecar.discord.channelID | quote }}
    body_preview_words: {{ .Values.sidecar.discord.bodyPreviewWords | default 40 }}
{{- end }}
