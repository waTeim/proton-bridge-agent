apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "proton-bridge.fullname" . }}-test-connection"
  labels:
    {{- include "proton-bridge.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: nc
      image: busybox
      command: ['sh', '-c']
      args: ['nc -z {{ include "proton-bridge.fullname" . }} {{ .Values.service.smtpPort }}']
  restartPolicy: Never
